
<div class="flex justify-center gap-6 mb-10">

    <button  class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow hover:bg-blue-700 transition"
    (click)="filtrer('tous')">Tous</button>

    <button  class="px-6 py-3 bg-red-600 text-white font-semibold rounded-lg shadow hover:bg-red-700 transition"
    (click)="filtrer('entreprise')">Entreprise</button>

    <button  class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg shadow hover:bg-green-700 transition"
    (click)="filtrer('interimaire')">Intérimaire</button>

</div>

    <div *ngIf="filtre === 'tous'" class="flex justify-center gap-12 flex-wrap">
        <app-card-entreprise-component></app-card-entreprise-component>
        <app-card-interimaire-component></app-card-interimaire-component>
    </div>

    <div *ngIf="filtre === 'entreprise'" class="flex justify-center">
        <app-card-entreprise-component></app-card-entreprise-component>
    </div>

    <div *ngIf="filtre === 'interimaire'" class="flex justify-center">
        <app-card-interimaire-component></app-card-interimaire-component>
    </div>
