<div class="w-[40vw] min-h-[280px] max-h-[280px] rounded-xl shadow-md bg-blue-200 p-4 flex flex-col items-center justify-between text-center overflow-hidden transition-all duration-300 hover:bg-blue-100"
    [class.max-h-[1000px]]="isExpanded">

    <div class="flex items-center gap-4 mb-2">
        <div class="w-12 h-12 rounded-full overflow-hidden border">
            <img *ngIf="data.photo" [src]="data.photo" alt="logo de l'entreprise" class="object-cover w-full h-full">
        </div>
        <div>
            <h2 class="font-bold text-lg">{{ data.nom }}</h2>
            <p class="text-sm text-gray-800">{{ data.type }}</p>
        </div>
    </div>
    <div class="text-sm space-y-1">
        <p><strong>Email :</strong> {{ data.email }}</p>
        <p><strong>Téléphone :</strong> {{ data.telephone }}</p>
        <p><strong>Adresse :</strong> {{ data.adressePostal }} ({{ data.codePostal }})</p>
        <p><strong>Poste recherché :</strong> {{ data.metier }}</p>
        <p><strong>Description entreprise :</strong> {{ data.description }}</p>
    </div>

    <div [hidden]="!isExpanded" class="mt-3 text-sm text-gray-900">
        <p class="font-semibold mb-1">Description du poste :</p>
        <p>{{ data.descriptionPoste }}</p>
    </div>

    <div class="mt-4">
        <button (click)="toggleExpanded()" class="text-indigo-800 underline text-sm font-medium">
            {{ isExpanded ? 'Réduire' : "Plus d'information" }}
            <span class="inline-block ml-1">▼</span>
        </button>
    </div>
</div>
