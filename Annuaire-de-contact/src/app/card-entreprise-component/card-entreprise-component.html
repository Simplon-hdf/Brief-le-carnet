<app-user-form-component></app-user-form-component>

<div class="rounded-xl shadow-md bg-blue-200 p-4 transition-all duration-300 ease-in-out w-full max-w-md"
    [ngClass]="{ 'max-h-fit': isExpanded, 'max-h-64': !isExpanded }">

    <div class="flex items-center gap-4 mb-2">
        <div class="w-12 h-12 rounded-full overflow-hidden border">
            <img *ngIf="testPng" [src]="testPng" alt="logo de l'entreprise" 
            class="object-cover w-full h-full">
        </div>
        <div>
            <h2 class="font-bold text-lg">{{ donneForm.nom }}</h2>
            <p class="text-sm text-gray-800">Entreprise</p>
        </div>
    </div>

    <div class="text-sm space-y-1">
        <p><strong>Email : </strong>{{ donneForm.email }}</p>
        <p><strong>Téléphone : </strong>{{ donneForm.telephone }}</p>
        <p><strong>Adresse : </strong>{{ donneForm.adressePostal }} ({{ donneForm.codePostal }})</p>
        <p><strong>Poste : </strong>{{ donneForm.metier }}</p>
    </div>

    <div class="mt-3 text-sm text-gray-900">
        <p>Description : </p>
        <p>{{ donneForm.description }}</p>
    </div>

    <div class="mt-4">
        <button  class="text-indigo-800 underline text-sm font-medium">{{ isExpanded ? 'Réduire' : "Plus d'information" }}</button>
    </div>
</div>
