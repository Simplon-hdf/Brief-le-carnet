<div class="w-[40vw] min-h-[280px] max-h-[280px] rounded-xl shadow-md bg-yellow-200 p-4 flex flex-col items-center justify-between text-center overflow-hidden transition-all duration-300 hover:bg-yellow-100"
    [class.max-h-[1000px]]="isExpanded">

    <div class="flex items-center gap-4 mb-2">
        <div class="w-12 h-12 rounded-full overflow-hidden border">
            <img *ngIf="data.photo" [src]="data.photo" alt="photo profil" class="object-cover w-full h-full">
        </div>
        <div>
            <h2 class="font-bold text-lg">{{ data.nom }} {{ data.prenom }}</h2>
            <p class="text-sm text-gray-800">{{ data.type }}</p>
        </div>
    </div>
    <div class="text-sm space-y-1">
        <p><strong>Age :</strong> {{ data.age }}</p>
        <p><strong>Email :</strong> {{ data.email }}</p>
        <p><strong>Téléphone :</strong> {{ data.telephone }}</p>
        <p><strong>Adresse :</strong> {{ data.adressePostal }} ({{ data.codePostal }})</p>
        <p><strong>Métier :</strong> {{ data.metier }}</p>
        <p><strong>Description :</strong> {{ data.description }}</p>
    </div>
</div>
