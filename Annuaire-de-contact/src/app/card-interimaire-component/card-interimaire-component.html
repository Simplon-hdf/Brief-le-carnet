<div class="w-[40vw] h-[280px] rounded-xl shadow-md bg-yellow-200 p-4 flex flex-col items-center justify-between text-center overflow-hidden">

    <div class="flex items-center gap-4 mb-2">
        <div class="w-12 h-12 rounded-full overflow-hidden border">
            <img ngIf="testPng" [src]="testPng" alt="Photo de profil"
            class="object-cover w-full h-full">
        </div>
        <div>
            <h2 class="font-bold text-lg">{{ donneForm.nom }} {{ donneForm.prenom }}</h2>
            <p class="text-sm text-gray-800">{{ donneForm.type}}</p>
        </div>
    </div>

    <div class="text-sm space-y-1">
        <p><strong>Âge : </strong>{{ donneForm.age}}</p>
        <p><strong>Email : </strong>{{ donneForm.email}}</p>
        <p><strong>Téléphone : </strong>{{ donneForm.telephone}}</p>
        <p><strong>Adresse : </strong>{{ donneForm.adressePostal}} {{ donneForm.codePostal}}</p>
        <p><strong>Métier : </strong>{{ donneForm.metier}}</p>
    </div>

    <div [hidden]="!isExpanded" class="mt-3 text-sm text-gray-900">
        <p class="font-semibold mb-1">Description : </p>
        <p>{{ donneForm.description}}</p>
    </div>

    <div class="mt-4">
        <button (click)="toggleExpanded()" class="text-indigo-800 underline text-sm font-medium">{{ isExpanded ? 'Réduire' : "Plus d'information" }}</button>
    </div>
    
</div>
