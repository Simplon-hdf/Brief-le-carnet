<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-8 text-center">Mes Contacts</h1>
  
  <div class="mb-8">
    <input 
      type="text" 
      placeholder="Rechercher un contact..." 
      [(ngModel)]="searchTerm"
      (input)="onSearch()"
      class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
  </div>

  <div>
    <h2 class="text-xl font-semibold mb-4">Contacts ({{ displayedContacts.length }})</h2>
    
    <div *ngIf="isLoading" class="text-center py-8 text-gray-500">
      Chargement...
    </div>

    <div *ngIf="!isLoading && displayedContacts.length === 0" class="text-center py-8 text-gray-500">
      {{ searchTerm ? 'Aucun contact trouvé.' : 'Aucun contact enregistré.' }}
    </div>

    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
      <div 
        *ngFor="let contact of displayedContacts" 
        class="bg-white p-4 rounded-lg shadow-md border">
        
        <h3 class="font-semibold text-lg mb-2">{{ contact.name }}</h3>
        <p class="text-gray-600 mb-1">✉️ {{ contact.email }}</p>
        <p *ngIf="contact.phone" class="text-gray-600 mb-2">📞 {{ contact.phone }}</p>

        <div class="flex gap-2 mt-4">
          <button 
            (click)="editContact(contact)"
            class="bg-yellow-500 text-white px-3 py-1 rounded text-sm hover:bg-yellow-600">
            ✏️ Modifier
          </button>
          <button 
            (click)="deleteContact(contact.id!)"
            class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600">
            🗑️ Supprimer
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="fixed bottom-6 right-6">
    <button 
      (click)="addNewContact()"
      class="bg-blue-500 text-white p-4 rounded-full shadow-lg hover:bg-blue-600 text-xl">
      ➕
    </button>
  </div>
</div>
