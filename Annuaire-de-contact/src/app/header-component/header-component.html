<header class="grid grid-cols-3 items-center px-6 py-6 bg-white min-h-28">

    <div></div>

    <a class="flex items-center justify-center">
        <img [src]="logo" alt="logo Le Carnet" class="h-80 w-auto">
    </a>

    <nav class="flex space-x-8 justify-center">
        <a routerLink="/" routerLinkActive="active" class="text-gray-700 hover:text-blue-600">Accueil</a>
        <a routerLink="/annuaire"  routerLinkActive="active" class="text-gray-700 hover:text-blue-600">Ajouter un contact</a>
    </nav>

    <button (click)="switchAdmin()" class="absolute top-2 right-4 text-sm bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1 rounded transition-colors z-10">
        Admin : {{ isAdmin ? 'ON' : 'OFF' }}
    </button>
</header>
